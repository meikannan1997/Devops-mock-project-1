services:
  mongo:
    image: mongo
    ports:
      - 8080:27017
  backend:
    build: ./backend
    ports:
      - 5001:5001
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/todo-db
    depends_on:
      - mongo
    env_file:
      - ./backend/.env
  frontend:
    build: ./frontend
    ports:
      - 3000:3000
    depends_on:
      - backend
    env_file:
      - ./frontend/.env.prod